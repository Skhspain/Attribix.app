# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "e56855f068d35fe1fc96e73bf90ae937"
name = "Attribix"
application_url = "https://attribix-app.fly.dev"
embedded = true
handle = "attribix-app"
privacy_policy_url = "https://attribix-app.fly.dev/privacy"

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2025-04"

[webhooks.privacy_compliance]
customer_deletion_url = "https://attribix-app.fly.dev/webhooks/gdpr/customers_redact"
customer_data_request_url = "https://attribix-app.fly.dev/webhooks/gdpr/customers_data_request"
shop_deletion_url = "https://attribix-app.fly.dev/webhooks/gdpr/shop_redact"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customer_events,read_orders,read_products,write_app_proxy,write_pixels,read_script_tags,write_script_tags"

[auth]
redirect_urls = [
  "https://attribix-app.fly.dev/auth/callback",
  "https://attribix-app.fly.dev/auth/login",
  "https://attribix-app.fly.dev/auth"
]

[app_proxy]
url = "https://attribix-app.fly.dev/app-proxy"
subpath = "pixel"
prefix = "apps"

[pos]
embedded = false
